<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - MovieRec</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 引入Vue 2 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <!-- 引入axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 配置Tailwind主题，与登录页保持一致
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        secondary: '#333333',
                        accent: '#f8fafc',
                        placeholder: '#6b7280',
                        disabled: '#4a4a4a'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-blur {
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
            }
            .text-shadow {
                text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            }
        }
    </style>
</head>
<body class="bg-black text-accent min-h-screen flex flex-col">
    <!-- 导航栏（与原页面/登录页完全一致） -->
    <nav class="bg-primary py-4 px-6 md:px-12 flex items-center justify-between sticky top-0 z-50">
        <a href="/index" class="text-2xl font-bold tracking-wider">MovieRec</a>
        <!-- 桌面端导航 -->
        <div class="hidden md:flex items-center space-x-8">
            <a href="{% url 'index' %}" class="hover:text-gray-300 transition-colors">首页</a>
            <a href="/category/" class="hover:text-gray-300 transition-colors">分类</a>
            <a href="/rank/" class="hover:text-gray-300 transition-colors">排行榜</a>
            <a href="/profile/" class="hover:text-gray-300 transition-colors">我的</a>
            <a href="{% url 'login' %}" class="hover:text-gray-300 transition-colors">登录</a>
        </div>
        <!-- 搜索框 -->
        <div class="relative hidden md:block w-64">
            <input
                type="text"
                placeholder="搜索电影..."
                class="w-full bg-secondary rounded-full px-4 py-2 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-gray-500"
            >
            <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
        </div>
        <!-- 移动端菜单按钮 -->
        <button class="md:hidden text-accent">
            <i class="fa fa-bars text-xl"></i>
        </button>
    </nav>

    <!-- 主内容区 -->
    <main class="flex-1 flex items-center justify-center px-4 py-12 bg-cover bg-center"
          style="background-image: url('https://picsum.photos/id/335/1920/1080'); background-color: #1a1a1a; background-blend-mode: multiply;"
          id="app">
        <!-- 注册卡片 -->
        <div class="w-full max-w-md bg-secondary/80 bg-blur rounded-lg shadow-2xl p-8 border border-gray-700">
            <h2 class="text-3xl font-bold mb-8 text-center">账号注册</h2>
            <!-- 使用默认表单提交，移除 @submit.prevent -->
            <form method="post" action="/register/" class="space-y-6" id="registerForm">
                {% csrf_token %}
                <!-- 用户名输入 -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm">用户名</label>
                    <div class="relative">
                        <i class="fa fa-user-circle absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
                        <input
                            type="text"
                            name="username"
                            v-model="form.username"
                            @blur="validateUsername"
                            class="w-full bg-primary border border-gray-600 rounded-lg px-10 py-3 focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                            placeholder="请设置用户名"
                            required
                        >
                    </div>
                    <span v-show="errors.username" class="text-red-400 text-xs mt-1">[[ errors.usernameMessage ]]</span>
                </div>
                <!-- 邮箱输入 -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm">邮箱</label>
                    <div class="relative">
                        <i class="fa fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
                        <input
                            type="email"
                            name="email"
                            v-model="form.email"
                            @blur="validateEmail"
                            class="w-full bg-primary border border-gray-600 rounded-lg px-10 py-3 focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                            placeholder="请输入常用邮箱"
                            required
                        >
                    </div>
                    <span v-show="errors.email" class="text-red-400 text-xs mt-1">[[ errors.emailMessage ]]</span>
                </div>
                <!-- 验证码输入 -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm">验证码</label>
                    <div class="relative flex items-center">
                        <i class="fa fa-shield absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
                        <input
                            type="text"
                            name="verifyCode"
                            v-model="form.verifyCode"
                            @blur="validateVerifyCode"
                            class="w-full bg-primary border border-gray-600 rounded-lg px-10 py-3 focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                            placeholder="请输入邮箱验证码"
                            required
                        >
                        <button
                            type="button"
                            @click="sendVerifyCode"
                            :disabled="countdown > 0 || isSending"
                            :class="[
                                'absolute right-2 text-accent text-sm rounded-lg px-3 py-2 transition-colors',
                                countdown > 0 || isSending
                                    ? 'bg-disabled cursor-not-allowed' 
                                    : 'bg-gray-800 hover:bg-gray-700'
                            ]"
                        >
                            [[ getVerifyButtonText() ]]
                        </button>
                    </div>
                    <span v-show="errors.verifyCode" class="text-red-400 text-xs mt-1">[[ errors.verifyCodeMessage ]]</span>
                </div>
                <!-- 密码输入 -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm">密码</label>
                    <div class="relative">
                        <i class="fa fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
                        <input
                            type="password"
                            name="password"
                            v-model="form.password"
                            @blur="validatePassword"
                            class="w-full bg-primary border border-gray-600 rounded-lg px-10 py-3 focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                            placeholder="8位以上字母数字组合"
                            required
                            minlength="8"
                        >
                    </div>
                    <span v-show="errors.password" class="text-red-400 text-xs mt-1">[[ errors.passwordMessage ]]</span>
                </div>
                <!-- 确认密码 -->
                <div>
                    <label class="block text-gray-300 mb-2 text-sm">确认密码</label>
                    <div class="relative">
                        <i class="fa fa-lock-open absolute left-3 top-1/2 -translate-y-1/2 text-placeholder"></i>
                        <input
                            type="password"
                            name="confirmPwd"
                            v-model="form.confirmPwd"
                            @blur="validateConfirmPwd"
                            class="w-full bg-primary border border-gray-600 rounded-lg px-10 py-3 focus:outline-none focus:ring-2 focus:ring-gray-500 transition-colors"
                            placeholder="请再次输入密码"
                            required
                        >
                    </div>
                    <span v-show="errors.confirmPwd" class="text-red-400 text-xs mt-1">[[ errors.confirmPwdMessage ]]</span>
                </div>
                <!-- 注册按钮 -->
                <button
                    type="submit"
                    class="w-full bg-gray-800 hover:bg-gray-700 text-accent font-semibold rounded-lg py-3 transition-colors flex items-center justify-center"
                    :disabled="isSubmitting"
                >
                    <i class="fa fa-user-plus mr-2"></i>
                    [[ isSubmitting ? '注册中...' : '完成注册' ]]
                </button>
                <!-- 登录引导 -->
                <div class="text-center text-gray-400 text-sm">
                    已有账号？
                    <a href="{% url 'login' %}" class="text-accent hover:text-gray-300 transition-colors">立即登录</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        // 创建Vue实例
        new Vue({
            el: '#app',
            delimiters: ['[[', ']]'],
            data() {
                return {
                    form: {
                        username: '',
                        email: '',
                        verifyCode: '',
                        password: '',
                        confirmPwd: ''
                    },
                    errors: {
                        username: false,
                        usernameMessage: '请输入用户名',
                        email: false,
                        emailMessage: '请输入有效的邮箱',
                        verifyCode: false,
                        verifyCodeMessage: '请输入验证码',
                        password: false,
                        passwordMessage: '密码至少8位',
                        confirmPwd: false,
                        confirmPwdMessage: '两次密码不一致'
                    },
                    countdown: 0,
                    isSending: false,
                    isSubmitting: false,
                    timer: null
                }
            },
            methods: {
                // 获取验证码按钮文本
                getVerifyButtonText() {
                    if (this.countdown > 0) {
                        return `${this.countdown}秒后重新发送`;
                    }
                    if (this.isSending) {
                        return '发送中...';
                    }
                    return '发送验证码';
                },

                // 验证用户名
                validateUsername() {
                    const username = this.form.username.trim();
                    if (!username) {
                        this.errors.username = true;
                        this.errors.usernameMessage = '请输入用户名';
                        return false;
                    }
                    this.errors.username = false;
                    return true;
                },

                // 验证邮箱
                validateEmail() {
                    const email = this.form.email.trim();
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    
                    if (!email) {
                        this.errors.email = true;
                        this.errors.emailMessage = '请输入邮箱';
                        return false;
                    }
                    if (!emailRegex.test(email)) {
                        this.errors.email = true;
                        this.errors.emailMessage = '请输入有效的邮箱地址';
                        return false;
                    }
                    this.errors.email = false;
                    return true;
                },

                // 验证验证码
                validateVerifyCode() {
                    const code = this.form.verifyCode.trim();
                    if (!code) {
                        this.errors.verifyCode = true;
                        this.errors.verifyCodeMessage = '请输入验证码';
                        return false;
                    }
                    this.errors.verifyCode = false;
                    return true;
                },

                // 验证密码
                validatePassword() {
                    const password = this.form.password;
                    if (!password) {
                        this.errors.password = true;
                        this.errors.passwordMessage = '请输入密码';
                        return false;
                    }
                    if (password.length < 8) {
                        this.errors.password = true;
                        this.errors.passwordMessage = '密码至少8位';
                        return false;
                    }
                    this.errors.password = false;
                    return true;
                },

                // 验证确认密码
                validateConfirmPwd() {
                    const confirmPwd = this.form.confirmPwd;
                    if (!confirmPwd) {
                        this.errors.confirmPwd = true;
                        this.errors.confirmPwdMessage = '请确认密码';
                        return false;
                    }
                    if (confirmPwd !== this.form.password) {
                        this.errors.confirmPwd = true;
                        this.errors.confirmPwdMessage = '两次密码不一致';
                        return false;
                    }
                    this.errors.confirmPwd = false;
                    return true;
                },

                // 验证整个表单
                validateForm() {
                    const validations = [
                        this.validateUsername(),
                        this.validateEmail(),
                        this.validatePassword(),
                        this.validateConfirmPwd(),
                        this.validateVerifyCode()
                    ];
                    return validations.every(valid => valid);
                },

                // 发送验证码
                async sendVerifyCode() {
                    if (!this.validateEmail()) {
                        return;
                    }

                    if (this.countdown > 0 || this.isSending) {
                        return;
                    }

                    this.isSending = true;
                    
                    try {
                        // 发送验证码请求到后端
                        const response = await axios.get('/emailcode/'+this.form.email+'/', {
                            email: this.form.email
                        });
                        
                        if (response.data.code==0) {
                            // 开始倒计时
                            this.countdown = 60;
                            this.startCountdown();
                            alert('验证码已发送到您的邮箱');
                        } else {
                            alert(response.data.message || '发送失败');
                        }
                    } catch (error) {
                        console.error('发送验证码失败:', error);
                        alert('发送验证码失败，请重试');
                    } finally {
                        this.isSending = false;
                    }
                },

                // 开始倒计时
                startCountdown() {
                    if (this.timer) {
                        clearInterval(this.timer);
                    }
                    
                    this.timer = setInterval(() => {
                        this.countdown--;
                        if (this.countdown <= 0) {
                            clearInterval(this.timer);
                            this.timer = null;
                        }
                    }, 1000);
                },

                // 处理表单提交
                async handleSubmit(event) {
                    // 阻止默认提交行为，先进行前端验证
                    event.preventDefault();
                    
                    if (!this.validateForm()) {
                        alert('请正确填写所有信息');
                        return;
                    }

                    this.isSubmitting = true;
                    
                    try {
                        // 所有验证通过，使用原生表单提交
                        const form = document.getElementById('registerForm');
                        if (form) {
                            // 确保表单数据是最新的（v-model已经自动更新）
                            form.submit();
                        }
                    } catch (error) {
                        console.error('提交失败:', error);
                        this.isSubmitting = false;
                    }
                }
            },
            // 组件销毁时清除定时器
            beforeDestroy() {
                if (this.timer) {
                    clearInterval(this.timer);
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>搜索结果 - MovieRec</title>
    <link rel="stylesheet" href="/static/css/search.css">
</head>
<body>

<header class="navbar">
    <div class="logo">MovieRec</div>
    <nav class="nav-links">
        <a href="/">首页</a>
        <a href="/category">分类</a>
        <a href="/hot">排行榜</a>
        <a href="/profile/">我的</a>
        <a href="#" class="active">搜索结果</a>
    </nav>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索电影...">
        <button onclick="searchMovie()">🔍 搜索</button>
    </div>
</header>

<div class="search-container">
    <div class="toolbar">
        <div class="sort-group">
            <span class="label">排序：</span>
            <button class="sort-btn active" data-type="year">按时间</button>
            <button class="sort-btn" data-type="rating">按评分</button>
        </div>
        <div class="result-info">找到 {{ movies_list|length }} 部影片</div>
    </div>

    <div class="movie-row" id="movieGrid">
        {% for movie in movies_list %}
        <a href="{% url 'detail' movie_id=movie.id %}" class="card-wrapper">
            <div class="movie-card" 
     data-year="{{ movie.year }}" 
     data-rating="{{ movie.rating }}">
    <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" loading="lazy" width="200" height="300">
    <div class="movie-info">
        <h3>{{ movie.title }}</h3>
        <p>{{ movie.year }} · <span class="rating-text">★ {{ movie.rating }}</span></p>
    </div>
</div>
        </a>
        {% empty %}
        <div class="empty-state">未找到相关电影</div>
        {% endfor %}
    </div>
</div>

<script src="/static/js/search.js"></script>
</body>
</html>
